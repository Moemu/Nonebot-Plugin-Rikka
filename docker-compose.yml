services:
  rikka-bot:
    build: .
    container_name: nonebot-plugin-rikka
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # 静态资源（封面、图标等），只读挂载
      - ./static:/app/static:ro
      # 日志文件持久化
      - ./logs:/app/logs
      # SQLite 数据库持久化
      - ./data:/app/data
    env_file:
      - .env

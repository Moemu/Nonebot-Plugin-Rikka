services:
  rikka-bot:
    build: .
    container_name: nonebot-plugin-rikka
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # 挂载静态资源（封面、图标等）
      - ./static:/app/static
      # 日志文件持久化
      - ./logs:/app/logs
      # SQLite 数据库存储目录持久化
      - ./data:/app/data
    env_file:
      - .env
    environment:
      SQLALCHEMY_DATABASE_URL: sqlite+aiosqlite:////app/data/rikka.db
